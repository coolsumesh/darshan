name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write .env to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: darshan.caringgems.in
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cat > /home/ubuntu/projects/darshan/apps/api/.env << 'EOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NODE_ENV=production
            PORT=4000
            HOST=0.0.0.0
            APP_BASE_URL=https://darshan.caringgems.in
            DARSHAN_API_KEY=${{ secrets.DARSHAN_API_KEY }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=https://darshan.caringgems.in/api/backend/api/v1/auth/google/callback
            OPENCLAW_BASE_URL=${{ secrets.OPENCLAW_BASE_URL }}
            OPENCLAW_API_KEY=${{ secrets.OPENCLAW_API_KEY }}
            OPENCLAW_MODEL=${{ secrets.OPENCLAW_MODEL }}
            EOF

      - name: Deploy API + Web
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: darshan.caringgems.in
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e
            source ~/.nvm/nvm.sh
            cd /home/ubuntu/projects/darshan

            git pull origin main

            # API
            cd apps/api
            pnpm install --frozen-lockfile
            pnpm build
            pm2 delete darshan-api 2>/dev/null || true
            pm2 start dist/index.js --name darshan-api --cwd /home/ubuntu/projects/darshan/apps/api
            sleep 3

            # Web
            cd ../web
            pnpm install --frozen-lockfile
            pnpm build
            pm2 delete darshan-web 2>/dev/null || true
            pm2 start node_modules/next/dist/bin/next --name darshan-web --cwd /home/ubuntu/projects/darshan/apps/web -- start

            pm2 save
            echo "Deploy complete"
